<!DOCTYPE html>
<html lang="en-NG" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales History — TradeFlow</title>
  <link rel="manifest" href="../manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/theme.css">
  <style>
    /*
     * Sales History — page-specific styles
     */

    /* Summary stat strip */
    .sales-stat-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: var(--space-3);
      margin-bottom: var(--space-5);
    }

    .sales-stat-item {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: var(--space-4) var(--space-5);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .sales-stat-label {
      font-size: var(--text-xs);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
    }

    .sales-stat-value {
      font-size: var(--text-xl);
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .sales-stat-sub {
      font-size: var(--text-xs);
      color: var(--text-muted);
    }

    /* Sale row in table — clickable to expand */
    .sale-row {
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .sale-row:hover { background: var(--bg-surface-2) !important; }
    .sale-row.expanded { background: var(--color-primary-light) !important; }
    [data-theme="dark"] .sale-row.expanded { background: rgba(37,99,235,0.12) !important; }

    /* Expand chevron */
    .expand-chevron {
      transition: transform 0.25s ease;
      color: var(--text-muted);
      font-size: 0.8rem;
    }
    .expand-chevron.open { transform: rotate(180deg); }

    /* Expanded detail row */
    .sale-detail-row td {
      padding: 0 !important;
      background: var(--bg-surface-2);
      border-bottom: 2px solid var(--color-primary) !important;
    }

    .sale-detail-inner {
      padding: var(--space-4) var(--space-6);
      animation: fadeIn 0.2s ease;
    }

    /* Items table inside expanded row */
    .detail-items-table {
      width: 100%;
      border-collapse: collapse;
      font-size: var(--text-sm);
      margin-bottom: var(--space-3);
    }
    .detail-items-table th {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      font-weight: 600;
      padding: var(--space-2) var(--space-3);
      border-bottom: 1px solid var(--border-color);
      text-align: left;
    }
    .detail-items-table td {
      padding: var(--space-2) var(--space-3);
      color: var(--text-primary);
      border-bottom: 1px solid var(--border-light);
    }
    .detail-items-table tr:last-child td { border-bottom: none; }

    /* Detail totals block */
    .detail-totals {
      border-left: 3px solid var(--color-primary);
      padding: var(--space-3) var(--space-4);
      background: var(--bg-surface);
      border-radius: 0 var(--radius-md) var(--radius-md) 0;
      min-width: 220px;
    }

    .detail-total-row {
      display: flex;
      justify-content: space-between;
      font-size: var(--text-sm);
      margin-bottom: 6px;
      color: var(--text-secondary);
    }
    .detail-total-row.final {
      font-size: var(--text-base);
      font-weight: 700;
      color: var(--text-primary);
      padding-top: 6px;
      border-top: 1px dashed var(--border-color);
      margin-top: 4px;
    }

    /* Payment method pill */
    .method-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: var(--radius-full);
      font-size: 0.7rem;
      font-weight: 600;
    }
    .method-cash     { background: var(--color-success-light); color: var(--color-success); }
    .method-transfer { background: var(--color-primary-light); color: var(--color-primary); }
    .method-card     { background: var(--color-info-light);    color: var(--color-info); }

    /* Receipt paper (in modal) */
    .receipt-paper {
      background: white;
      color: #1a1a1a;
      border-radius: var(--radius-md);
      padding: var(--space-6);
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
      max-width: 340px;
      margin: 0 auto;
    }
    .receipt-header   { text-align: center; margin-bottom: var(--space-4); }
    .receipt-biz-name { font-size: 16px; font-weight: 700; letter-spacing: 0.05em; }
    .receipt-divider  { border: none; border-top: 1px dashed #ccc; margin: var(--space-3) 0; }
    .receipt-row      { display: flex; justify-content: space-between; gap: var(--space-2); }
    .receipt-row.total-row {
      font-weight: 700; font-size: 14px;
      border-top: 1px dashed #ccc;
      padding-top: var(--space-2); margin-top: var(--space-2);
    }
    .receipt-footer   { text-align: center; margin-top: var(--space-4); color: #666; font-size: 11px; }

    /* Date group header in table */
    .date-group-row td {
      background: var(--bg-surface-2);
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      padding: var(--space-2) var(--space-4) !important;
      border-bottom: 1px solid var(--border-color);
    }

    /* Pagination */
    .pagination-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-4) var(--space-2);
      font-size: var(--text-sm);
      color: var(--text-muted);
      flex-wrap: wrap;
      gap: var(--space-3);
    }
    /* RESPONSIVE ENGINE VIEWPORT BLOCK */
    @media (max-width: 991px) {
      /* Stack summary stats cards into two clean columns on smaller screens */
      .sales-stat-strip {
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        gap: var(--space-2);
      }
      
      /* Make filter toolbar fields stack cleanly vertically */
      .card-body > div {
        flex-direction: column !important;
        align-items: stretch !important;
        gap: var(--space-3) !important;
      }
      
      .card-body > div > * {
        width: 100% !important;
        max-width: 100% !important;
      }

      /* Transform table layout into a responsive block list */
      #sales-table, 
      #sales-table thead, 
      #sales-table tbody, 
      #sales-table th, 
      #sales-table td, 
      #sales-table tr { 
        display: block; 
      }
      
      /* Hide the desktop header labels row safely */
      #sales-table thead tr { 
        position: absolute;
        top: -9999px;
        left: -9999px;
      }
      
      /* Turn each individual transaction row into its own clean card block */
      .sale-row {
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        margin-bottom: var(--space-3);
        padding: var(--space-3) !important;
        background: var(--bg-surface);
        position: relative;
      }
      
      .sale-row td {
        border: none !important;
        padding: var(--space-1) 0 !important;
        text-align: left !important;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: var(--text-sm);
      }

      /* Dynamically prepend data labels using CSS counters so rows retain full context */
      .sale-row td:nth-of-type(1) { order: 1; padding-bottom: var(--space-2) !important; border-bottom: 1px dashed var(--border-color) !important; }
      .sale-row td:nth-of-type(2)::before { content: "Receipt #:"; font-weight: 600; color: var(--text-muted); }
      .sale-row td:nth-of-type(2) { order: 2; }
      .sale-row td:nth-of-type(3)::before { content: "Date:"; font-weight: 600; color: var(--text-muted); }
      .sale-row td:nth-of-type(3) { order: 3; text-align: right !important; }
      .sale-row td:nth-of-type(4)::before { content: "Customer:"; font-weight: 600; color: var(--text-muted); }
      .sale-row td:nth-of-type(4) { order: 4; }
      .sale-row td:nth-of-type(5)::before { content: "Items Info:"; font-weight: 600; color: var(--text-muted); }
      .sale-row td:nth-of-type(5) { order: 5; text-align: right !important; }
      .sale-row td:nth-of-type(6)::before { content: "Payment:"; font-weight: 600; color: var(--text-muted); }
      .sale-row td:nth-of-type(6) { order: 6; }
      .sale-row td:nth-of-type(7)::before { content: "VAT (7.5%):"; font-weight: 600; color: var(--text-muted); }
      .sale-row td:nth-of-type(7) { order: 7; }
      .sale-row td:nth-of-type(8)::before { content: "Total Amount:"; font-weight: 600; color: var(--text-muted); }
      .sale-row td:nth-of-type(8) { order: 8; }
      .sale-row td:nth-of-type(9) { order: 9; justify-content: flex-end; gap: var(--space-2); padding-top: var(--space-2) !important; border-top: 1px dashed var(--border-color) !important; }

      /* Handle internal layout box properties for expanded details view on mobile */
      .sale-detail-row {
        margin-top: calc(-1 * var(--space-3));
        margin-bottom: var(--space-4);
        border: 1px solid var(--border-color);
        border-top: none;
        border-radius: 0 0 var(--radius-md) var(--radius-md);
      }
      .sale-detail-inner {
        padding: var(--space-3) !important;
      }
      .detail-items-table th { padding: var(--space-1) var(--space-2); }
      .detail-items-table td { padding: var(--space-2) var(--space-2); }
    }


    /* Print styles */
    @media print {
      body > *:not(#print-area) { display: none !important; }
      #print-area {
        display: block !important;
        position: fixed; inset: 0;
        background: white; z-index: 9999; padding: 20px;
      }
    }
  </style>
</head>
<body>

<div class="app-shell">
  <aside id="app-sidebar" class="sidebar"></aside>
  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <div class="app-main" id="app-main">

    <!-- Topbar -->
    <header class="topbar" id="app-topbar">
      <div class="topbar-left">
        <button class="sidebar-toggle" id="sidebar-toggle-btn">
          <i class="fa-solid fa-bars"></i>
        </button>
        <span class="topbar-title" id="topbar-title">Sales History</span>
      </div>
      <div class="topbar-right">
        <button class="theme-toggle"><i class="fa-solid fa-moon"></i></button>
        <div class="dropdown">
          <button class="user-avatar-btn dropdown-toggle" data-bs-toggle="dropdown">
            <div class="user-avatar" id="topbar-avatar">AU</div>
            <span class="d-none d-md-inline" id="topbar-username">Admin</span>
            <i class="fa-solid fa-chevron-down" style="font-size:0.65rem;color:var(--text-muted);"></i>
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li>
              <div style="padding:var(--space-3) var(--space-4);border-bottom:1px solid var(--border-color);">
                <div style="font-size:var(--text-sm);font-weight:600;" id="topbar-username-dd"></div>
                <div style="font-size:var(--text-xs);color:var(--text-muted);" id="topbar-userrole"></div>
              </div>
            </li>
            <li>
              <a class="dropdown-item logout-btn" href="#">
                <i class="fa-solid fa-right-from-bracket me-2"></i>Sign Out
              </a>
            </li>
          </ul>
        </div>
      </div>
    </header>

    <main class="page-content">

      <!-- Page Header -->
      <div class="page-header">
        <div>
          <h1 class="section-title">Sales History</h1>
          <p class="section-subtitle" id="sales-count-label">Loading...</p>
        </div>
        <a href="pos.html" class="btn btn-primary">
          <i class="fa-solid fa-plus"></i> New Sale
        </a>
      </div>

      <!-- Summary Stats Strip -->
      <div class="sales-stat-strip" id="sales-stats">
        <div class="sales-stat-item">
          <span class="sales-stat-label">Total Revenue</span>
          <span class="sales-stat-value" id="stat-revenue">₦0</span>
          <span class="sales-stat-sub" id="stat-period">Selected period</span>
        </div>
        <div class="sales-stat-item">
          <span class="sales-stat-label">Transactions</span>
          <span class="sales-stat-value" id="stat-count">0</span>
          <span class="sales-stat-sub">Sales recorded</span>
        </div>
        <div class="sales-stat-item">
          <span class="sales-stat-label">Avg. Sale</span>
          <span class="sales-stat-value" id="stat-avg">₦0</span>
          <span class="sales-stat-sub">Per transaction</span>
        </div>
        <div class="sales-stat-item">
          <span class="sales-stat-label">VAT Collected</span>
          <span class="sales-stat-value" id="stat-vat">₦0</span>
          <span class="sales-stat-sub">7.5% on sales</span>
        </div>
        <div class="sales-stat-item">
          <span class="sales-stat-label">Items Sold</span>
          <span class="sales-stat-value" id="stat-items">0</span>
          <span class="sales-stat-sub">Total units</span>
        </div>
      </div>

      <!-- Filter & Search Toolbar -->
      <div class="card mb-4">
        <div class="card-body" style="padding:var(--space-4);">
          <div style="display:flex;align-items:center;gap:var(--space-3);flex-wrap:wrap;">

            <!-- Receipt / customer search -->
            <div class="input-group" style="flex:1;min-width:200px;max-width:320px;">
              <span class="input-group-icon"><i class="fa-solid fa-magnifying-glass"></i></span>
              <input
                type="text"
                id="sales-search"
                class="form-control"
                placeholder="Receipt #, customer, product..."
              >
            </div>

            <!-- Date from -->
            <div style="display:flex;align-items:center;gap:var(--space-2);">
              <label style="font-size:var(--text-xs);color:var(--text-muted);white-space:nowrap;">From</label>
              <input type="date" id="date-from" class="form-control" style="width:auto;">
            </div>

            <!-- Date to -->
            <div style="display:flex;align-items:center;gap:var(--space-2);">
              <label style="font-size:var(--text-xs);color:var(--text-muted);white-space:nowrap;">To</label>
              <input type="date" id="date-to" class="form-control" style="width:auto;">
            </div>

            <!-- Payment method filter -->
            <select id="method-filter" class="form-control form-select" style="width:auto;">
              <option value="">All Methods</option>
              <option value="cash">Cash</option>
              <option value="transfer">Transfer</option>
              <option value="card">Card</option>
            </select>

            <!-- Quick range buttons -->
            <div style="display:flex;gap:var(--space-1);">
              <button class="btn btn-outline btn-sm range-btn" data-range="today">Today</button>
              <button class="btn btn-outline btn-sm range-btn" data-range="7">7d</button>
              <button class="btn btn-outline btn-sm range-btn active" data-range="30">30d</button>
              <button class="btn btn-outline btn-sm range-btn" data-range="all">All</button>
            </div>

            <!-- Clear filters -->
            <button class="btn btn-ghost btn-sm" id="clear-filters-btn" style="color:var(--text-muted);">
              <i class="fa-solid fa-xmark"></i> Clear
            </button>

          </div>
        </div>
      </div>

      <!-- Sales Table -->
      <div class="tf-table-wrapper" id="sales-table-wrapper">
        <table class="tf-table" id="sales-table">
          <thead>
            <tr>
              <th style="width:32px;"></th><!-- expand toggle -->
              <th>Receipt #</th>
              <th>Date & Time</th>
              <th>Customer</th>
              <th>Items</th>
              <th>Payment</th>
              <th>VAT</th>
              <th>Total</th>
              <th style="text-align:right;">Actions</th>
            </tr>
          </thead>
          <tbody id="sales-tbody">
            <!-- Populated by JS -->
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="pagination-bar" id="pagination-bar"></div>

    </main>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════
     RECEIPT VIEW MODAL
═══════════════════════════════════════════════════════════════ -->
<div class="modal fade" id="receipt-modal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable" style="max-width:440px;">
    <div class="modal-content">

      <div class="modal-header">
        <div style="display:flex;align-items:center;gap:var(--space-3);">
          <div style="width:36px;height:36px;border-radius:var(--radius-md);background:var(--color-primary-light);color:var(--color-primary);display:flex;align-items:center;justify-content:center;">
            <i class="fa-solid fa-receipt"></i>
          </div>
          <div>
            <h5 class="modal-title" id="receipt-modal-number">Receipt</h5>
            <div style="font-size:var(--text-xs);color:var(--text-muted);" id="receipt-modal-date"></div>
          </div>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body" style="background:var(--bg-surface-2);padding:var(--space-5);">
        <div class="receipt-paper" id="receipt-paper">
          <!-- Populated by JS -->
        </div>
      </div>

      <div class="modal-footer" style="justify-content:space-between;">
        <button class="btn btn-outline" data-bs-dismiss="modal">Close</button>
        <div style="display:flex;gap:var(--space-2);">
          <button class="btn btn-outline" id="modal-print-btn">
            <i class="fa-solid fa-print"></i> Print
          </button>
          <button class="btn btn-primary" id="modal-whatsapp-btn">
            <i class="fa-brands fa-whatsapp"></i> Share

</div>

<!-- Hidden print area -->
<div id="print-area" style="display:none;"></div>

<!-- Toast container -->

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/storage.js"></script>
<script src="../assets/js/theme.js"></script>
<script src="../assets/js/utils.js"></script>
<script src="../assets/js/app.js"></script>

<script>
/**
 * Sales History Module
 * ====================
 * Features:
 * - Searchable by receipt number, customer name, product name
 * - Filterable by date range (from/to) and payment method
 * - Quick-range buttons: Today / 7d / 30d / All
 * - Paginated table (15 rows per page)
 * - Expandable rows showing full itemised sale details
 * - Receipt view modal with print and WhatsApp share
 * - Summary stats strip that updates with active filters
 */
const SalesHistory = (() => {

  // ── State ────────────────────────────────────────────────────────────────
  let allSales      = [];   // All sales from storage (newest first)
  let filteredSales = [];   // After filters applied
  let currentPage   = 1;
  const PAGE_SIZE   = 15;

  let expandedId    = null; // ID of currently expanded sale row
  let viewingSale   = null; // Sale object in receipt modal

  let receiptModal;

  // ── Init ─────────────────────────────────────────────────────────────────
  function init() {
    receiptModal = new bootstrap.Modal(document.getElementById('receipt-modal'));

    // Set default date range to last 30 days
    document.getElementById('date-to').value   = Utils.todayISO();
    document.getElementById('date-from').value = Utils.daysAgoISO(30);

    loadAndRender();
    bindEvents();
    bindModalButtons();
  }

  // ── Data ─────────────────────────────────────────────────────────────────
  function loadAndRender() {
    // Load all sales, newest first
    allSales = [...Storage.getSales()].sort(
      (a, b) => new Date(b.createdAt) - new Date(a.createdAt)
    );
    applyFilters();
  }

  // ── Filters ───────────────────────────────────────────────────────────────
  function applyFilters() {
    const q       = document.getElementById('sales-search').value.trim().toLowerCase();
    const from    = document.getElementById('date-from').value;
    const to      = document.getElementById('date-to').value;
    const method  = document.getElementById('method-filter').value;

    filteredSales = allSales.filter((sale) => {

      // ── Date range filter ──
      if (from) {
        const saleDate = new Date(sale.createdAt);
        const fromDate = new Date(from + 'T00:00:00');
        if (saleDate < fromDate) return false;
      }
      if (to) {
        const saleDate = new Date(sale.createdAt);
        const toDate   = new Date(to + 'T23:59:59');
        if (saleDate > toDate) return false;
      }

      // ── Payment method filter ──
      if (method && sale.paymentMethod !== method) return false;

      // ── Text search ──
      if (q) {
        const inReceipt  = (sale.receiptNumber || '').toLowerCase().includes(q);
        const inCustomer = (sale.customerName  || '').toLowerCase().includes(q);
        const inCashier  = (sale.cashier       || '').toLowerCase().includes(q);
        const inItems    = (sale.items || []).some(
          (i) => (i.productName || '').toLowerCase().includes(q)
        );
        if (!inReceipt && !inCustomer && !inCashier && !inItems) return false;
      }

      return true;
    });

    currentPage  = 1;
    expandedId   = null;
    renderStats();
    renderTable();
    updateCountLabel();
  }

  // ── Stats Strip ───────────────────────────────────────────────────────────
  function renderStats() {
    const summary = Utils.summariseSales(filteredSales);

    _set('stat-revenue', Utils.formatCurrency(summary.totalRevenue, true));
    _set('stat-count',   summary.transactions);
    _set('stat-avg',     Utils.formatCurrency(summary.avgTransaction, true));
    _set('stat-vat',     Utils.formatCurrency(summary.totalVAT, true));
    _set('stat-items',   Utils.formatNumber(summary.totalItems));

    // Period label
    const from = document.getElementById('date-from').value;
    const to   = document.getElementById('date-to').value;
    const periodLabel = from && to
      ? `${Utils.formatDate(from)} – ${Utils.formatDate(to)}`
      : 'All time';
    _set('stat-period', periodLabel);
  }

  // ── Table Render ──────────────────────────────────────────────────────────
  function renderTable() {
    const tbody = document.getElementById('sales-tbody');
    if (!tbody) return;

    const start = (currentPage - 1) * PAGE_SIZE;
    const page  = filteredSales.slice(start, start + PAGE_SIZE);

    if (page.length === 0) {
      tbody.innerHTML = `
        <tr>
          <td colspan="9">
            <div class="empty-state">
              <div class="empty-state-icon"><i class="fa-solid fa-receipt"></i></div>
              <p class="empty-state-title">No sales found</p>
              <p class="empty-state-desc">
                Try adjusting your search terms or date range filters.
              </p>
                <a href="pos.html" class="btn btn-primary btn-sm mt-2">
                <i class="fa-solid fa-plus"></i> Make a Sale
              </a>
            </div>
          </td>
        </tr>`;
      renderPagination(0);
      return;
    }

    // Build rows — each sale row + a hidden detail row beneath it
    const rows = [];
    let   lastDate = '';

    page.forEach((sale) => {
      // ── Date group separator ──
      const saleDate = new Date(sale.createdAt).toLocaleDateString('en-NG', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });
      if (saleDate !== lastDate) {
        rows.push(`
          <tr class="date-group-row">
            <td colspan="9">${saleDate}</td>
          </tr>`);
        lastDate = saleDate;
      }

      // ── Sale summary row ──
      const isExpanded = sale.id === expandedId;
      const itemCount  = (sale.items || []).length;
      const itemNames  = (sale.items || [])
        .slice(0, 2)
        .map((i) => Utils.escapeHtml(Utils.truncate(i.productName, 16)))
        .join(', ');
      const moreItems  = itemCount > 2 ? ` +${itemCount - 2} more` : '';
      const methodCfg  = _methodConfig(sale.paymentMethod);

      rows.push(`
        <tr
          class="sale-row ${isExpanded ? 'expanded' : ''}"
          id="sale-row-${sale.id}"
          onclick="SalesHistory.toggleExpand('${sale.id}')"
          aria-expanded="${isExpanded}"
        >
          <!-- Expand toggle -->
          <td style="padding-left:var(--space-4);">
            <i class="fa-solid fa-chevron-down expand-chevron ${isExpanded ? 'open' : ''}"></i>
          </td>

          <!-- Receipt number -->
          <td>
            <span style="font-family:var(--font-mono);font-size:0.75rem;font-weight:600;color:var(--color-primary);">
              ${Utils.escapeHtml(sale.receiptNumber || '—')}
            </span>
          </td>

          <!-- Date & time -->
          <td>
            <div style="font-size:var(--text-sm);">${Utils.formatDate(sale.createdAt)}</div>
            <div style="font-size:var(--text-xs);color:var(--text-muted);">${Utils.formatTime(sale.createdAt)}</div>
          </td>

          <!-- Customer -->
          <td>
            <div style="font-size:var(--text-sm);">
              ${sale.customerName
                ? Utils.escapeHtml(Utils.truncate(sale.customerName, 18))
                : '<span style="color:var(--text-muted);">Walk-in</span>'}
            </div>
            <div style="font-size:0.65rem;color:var(--text-muted);">
              ${Utils.escapeHtml(sale.cashier || '')}
            </div>
          </td>

          <!-- Items preview -->
          <td>
            <div style="font-size:var(--text-xs);color:var(--text-secondary);">
              ${itemNames}${moreItems}
            </div>
            <div style="font-size:0.65rem;color:var(--text-muted);">${itemCount} item${itemCount !== 1 ? 's' : ''}</div>
          </td>

          <!-- Payment method -->
          <td>
            <span class="method-pill ${methodCfg.cls}">
              <i class="fa-solid ${methodCfg.icon}"></i>
              ${methodCfg.label}
            </span>
          </td>

          <!-- VAT -->
          <td style="font-size:var(--text-sm);color:var(--text-muted);">
            ${Utils.formatCurrency(sale.vatAmount || 0)}
          </td>

          <!-- Total -->
          <td>
            <span style="font-size:var(--text-sm);font-weight:700;color:var(--text-primary);">
              ${Utils.formatCurrency(sale.total)}
            </span>
          </td>

          <!-- Actions — stop propagation so clicks don't toggle expand -->
          <td onclick="event.stopPropagation();" style="text-align:right;">
            <button
              class="btn btn-ghost btn-icon-sm"
              title="View Receipt"
              onclick="SalesHistory.viewReceipt('${sale.id}')"
            >
              <i class="fa-solid fa-receipt"></i>
            </button>
            <button
              class="btn btn-ghost btn-icon-sm"
              title="Print Receipt"
              onclick="SalesHistory.printReceipt('${sale.id}')"
            >
              <i class="fa-solid fa-print"></i>
            </button>
          </td>
        </tr>

        <!-- ── Expanded detail row (hidden when not expanded) ── -->
        <tr class="sale-detail-row" id="detail-row-${sale.id}"
          style="${isExpanded ? '' : 'display:none;'}">
          <td colspan="9">
            ${buildDetailHtml(sale)}
          </td>
        </tr>
      `);
    });

    tbody.innerHTML = rows.join('');
    renderPagination(filteredSales.length);
  }

  // ── Build Detail HTML (expanded row content) ──────────────────────────────
  function buildDetailHtml(sale) {
    // Itemised list
    const itemRows = (sale.items || []).map((item) => `
      <tr>
        <td>
          <div style="font-weight:500;">${Utils.escapeHtml(item.productName)}</div>
          <div style="font-size:0.65rem;color:var(--text-muted);font-family:var(--font-mono);">${Utils.escapeHtml(item.sku || '')}</div>
        </td>
        <td style="text-align:right;">${Utils.formatCurrency(item.price)}</td>
        <td style="text-align:center;">${item.quantity}</td>
        <td style="text-align:right;font-weight:600;">${Utils.formatCurrency(item.subtotal)}</td>
      </tr>`).join('');

    const methodCfg = _methodConfig(sale.paymentMethod);

    return `
      <div class="sale-detail-inner">
        <div style="display:flex;gap:var(--space-6);flex-wrap:wrap;align-items:flex-start;">

          <!-- Items table -->
          <div style="flex:1;min-width:280px;">
            <div style="font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:var(--space-2);">
              Items Purchased
            </div>
            <table class="detail-items-table">
              <thead>
                <tr>
                  <th>Product</th>
                  <th style="text-align:right;">Unit Price</th>
                  <th style="text-align:center;">Qty</th>
                  <th style="text-align:right;">Subtotal</th>
                </tr>
              </thead>
              <tbody>${itemRows}</tbody>
            </table>
          </div>

          <!-- Totals block -->
          <div style="min-width:220px;">
            <div style="font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:var(--space-2);">
              Sale Summary
            </div>
            <div class="detail-totals">
              <div class="detail-total-row">
                <span>Subtotal</span>
                <span>${Utils.formatCurrency(sale.subtotal)}</span>
              </div>
              ${sale.discount > 0 ? `
                <div class="detail-total-row" style="color:var(--color-danger);">
                  <span>Discount</span>
                  <span>−${Utils.formatCurrency(sale.discount)}</span>
                </div>` : ''}
              <div class="detail-total-row">
                <span>VAT (${sale.vatRate || 7.5}%)</span>
                <span>${Utils.formatCurrency(sale.vatAmount)}</span>
              </div>
              <div class="detail-total-row final">
                <span>Total</span>
                <span>${Utils.formatCurrency(sale.total)}</span>
              </div>

              <!-- Metadata -->
              <div style="margin-top:var(--space-3);padding-top:var(--space-3);border-top:1px solid var(--border-color);">
                <div style="font-size:var(--text-xs);color:var(--text-muted);margin-bottom:4px;">
                  <i class="fa-solid ${methodCfg.icon}" style="width:14px;"></i>
                  ${methodCfg.label}
                </div>
                ${sale.customerName ? `
                  <div style="font-size:var(--text-xs);color:var(--text-muted);margin-bottom:4px;">
                    <i class="fa-solid fa-user" style="width:14px;"></i>
                    ${Utils.escapeHtml(sale.customerName)}
                  </div>` : ''}
                <div style="font-size:var(--text-xs);color:var(--text-muted);margin-bottom:4px;">
                  <i class="fa-solid fa-clock" style="width:14px;"></i>
                  ${Utils.formatDateTime(sale.createdAt)}
                </div>
                <div style="font-size:var(--text-xs);color:var(--text-muted);">
                  <i class="fa-solid fa-user-tie" style="width:14px;"></i>
                  ${Utils.escapeHtml(sale.cashier || 'Staff')}
                </div>
              </div>
            </div>

            <!-- Action buttons -->
            <div style="display:flex;gap:var(--space-2);margin-top:var(--space-3);">
              <button
                class="btn btn-outline btn-sm"
                onclick="SalesHistory.viewReceipt('${sale.id}')"
              >
                <i class="fa-solid fa-receipt"></i> Receipt
              </button>
              <button
                class="btn btn-outline btn-sm"
                onclick="SalesHistory.printReceipt('${sale.id}')"
              >
                <i class="fa-solid fa-print"></i> Print
              </button>
            </div>
          </div>

        </div>
      </div>`;
  }
  // ── Toggle Expand Row ─────────────────────────────────────────────────────
  function toggleExpand(saleId) {
    const detailRow = document.getElementById(`detail-row-${saleId}`);
    const saleRow   = document.getElementById(`sale-row-${saleId}`);
    const chevron   = saleRow?.querySelector('.expand-chevron');

    if (expandedId === saleId) {
      // Collapse current
      detailRow?.style && (detailRow.style.display = 'none');
      saleRow?.classList.remove('expanded');
      chevron?.classList.remove('open');
      expandedId = null;
    } else {
      // Collapse any previously expanded row
      if (expandedId) {
        const prevDetail = document.getElementById(`detail-row-${expandedId}`);
        const prevRow    = document.getElementById(`sale-row-${expandedId}`);
        const prevChev   = prevRow?.querySelector('.expand-chevron');
        if (prevDetail) prevDetail.style.display = 'none';
        prevRow?.classList.remove('expanded');
        prevChev?.classList.remove('open');
      }

      // Expand clicked row
      if (detailRow) detailRow.style.display = '';
      saleRow?.classList.add('expanded');
      chevron?.classList.add('open');
      expandedId = saleId;
    }
  }

  // ── Receipt Modal ─────────────────────────────────────────────────────────
  function viewReceipt(saleId) {
    const sale     = Storage.getSales().find((s) => s.id === saleId);
    if (!sale) return;
    viewingSale    = sale;

    const settings = Storage.getSettings();
    _set('receipt-modal-number', sale.receiptNumber || 'Receipt');
    _set('receipt-modal-date',   Utils.formatDateTime(sale.createdAt));

    document.getElementById('receipt-paper').innerHTML =
      buildReceiptHtml(sale, settings);

    receiptModal.show();
  }

  // ── Build Receipt HTML ────────────────────────────────────────────────────
  function buildReceiptHtml(sale, settings) {
    const biz     = settings?.businessName    || 'TradeFlow Store';
    const address = settings?.businessAddress || '';
    const phone   = settings?.businessPhone   || '';
    const methodLabels = { cash: 'Cash', transfer: 'Bank Transfer', card: 'Card Payment' };

    const itemsHtml = (sale.items || []).map((item) => `
      <div class="receipt-row">
        <span style="flex:1;">${Utils.escapeHtml(Utils.truncate(item.productName, 24))}</span>
        <span>${item.quantity}×</span>
        <span style="min-width:80px;text-align:right;">${Utils.formatCurrency(item.subtotal)}</span>
      </div>`).join('');

    return `
      <div class="receipt-header">
        <div class="receipt-biz-name">${Utils.escapeHtml(biz)}</div>
        ${address ? `<div style="font-size:11px;color:#555;">${Utils.escapeHtml(address)}</div>` : ''}
        ${phone   ? `<div style="font-size:11px;color:#555;">Tel: ${Utils.escapeHtml(phone)}</div>` : ''}
      </div>

      <hr class="receipt-divider">

      <div class="receipt-row" style="font-size:11px;color:#555;">
        <span>Receipt: <strong>${Utils.escapeHtml(sale.receiptNumber || '')}</strong></span>
        <span>${Utils.formatDate(sale.createdAt)}</span>
      </div>
      <div style="font-size:11px;color:#555;margin-bottom:8px;">
        Time: ${Utils.formatTime(sale.createdAt)}
        &nbsp;·&nbsp;
        Cashier: ${Utils.escapeHtml(sale.cashier || 'Staff')}
      </div>
      ${sale.customerName
        ? `<div style="font-size:11px;color:#555;margin-bottom:8px;">
            Customer: ${Utils.escapeHtml(sale.customerName)}
           </div>`
        : ''}

      <hr class="receipt-divider">

      <div style="font-size:10px;color:#999;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;">
        Items
      </div>
      <div style="margin-bottom:8px;">${itemsHtml}</div>

      <hr class="receipt-divider">

      <div class="receipt-row" style="font-size:12px;margin-bottom:4px;">
        <span>Subtotal</span><span>${Utils.formatCurrency(sale.subtotal)}</span>
      </div>
      ${sale.discount > 0 ? `
        <div class="receipt-row" style="font-size:12px;color:#e53e3e;margin-bottom:4px;">
          <span>Discount</span><span>−${Utils.formatCurrency(sale.discount)}</span>
        </div>` : ''}
      <div class="receipt-row" style="font-size:12px;margin-bottom:4px;">
        <span>VAT (${sale.vatRate || 7.5}%)</span>
        <span>${Utils.formatCurrency(sale.vatAmount)}</span>
      </div>
      <div class="receipt-row total-row">
        <span>TOTAL</span>
        <span>${Utils.formatCurrency(sale.total)}</span>
      </div>
      <div style="margin-top:8px;font-size:12px;">
        <strong>Payment:</strong> ${methodLabels[sale.paymentMethod] || sale.paymentMethod || 'Cash'}
      </div>

      <div class="receipt-footer">
        <hr class="receipt-divider">
        <div>Thank you for your patronage!</div>
        <div style="margin-top:4px;">Powered by TradeFlow &nbsp;·&nbsp; tradeflow.ng</div>
      </div>`;
  }

  // ── Print Receipt ─────────────────────────────────────────────────────────
  function printReceipt(saleId) {
    const sale = Storage.getSales().find((s) => s.id === saleId);
    if (!sale) return;

    const settings  = Storage.getSettings();
    const printArea = document.getElementById('print-area');
    printArea.innerHTML = `
      <div style="font-family:'Courier New',monospace;font-size:13px;max-width:340px;margin:0 auto;padding:20px;">
        ${buildReceiptHtml(sale, settings)}
      </div>`;

    window.print();
  }

  // ── WhatsApp Share ────────────────────────────────────────────────────────
  function shareWhatsApp(sale) {
    if (!sale) return;
    const settings = Storage.getSettings();
    const biz      = settings.businessName || 'TradeFlow Store';
    const methodLabels = { cash: 'Cash', transfer: 'Bank Transfer', card: 'Card Payment' };

    const lines = [
      `*${biz}*`,
      settings.businessAddress || '',
      `Receipt #: ${sale.receiptNumber}`,
      `Date: ${Utils.formatDate(sale.createdAt)} ${Utils.formatTime(sale.createdAt)}`,
      sale.customerName ? `Customer: ${sale.customerName}` : '',
      '──────────────────',
      ...(sale.items || []).map(
        (i) => `${i.productName} ×${i.quantity} = ${Utils.formatCurrency(i.subtotal)}`
      ),
      '──────────────────',
      `Subtotal: ${Utils.formatCurrency(sale.subtotal)}`,
      sale.discount > 0 ? `Discount: −${Utils.formatCurrency(sale.discount)}` : null,
      `VAT (${sale.vatRate || 7.5}%): ${Utils.formatCurrency(sale.vatAmount)}`,
      `*TOTAL: ${Utils.formatCurrency(sale.total)}*`,
      `Payment: ${methodLabels[sale.paymentMethod] || sale.paymentMethod}`,
      '',
      'Thank you for your patronage!',
    ].filter(Boolean).join('\n');

    window.open(`https://wa.me/?text=${encodeURIComponent(lines)}`, '_blank');
  }

  // ── Pagination ────────────────────────────────────────────────────────────
  function renderPagination(total) {
    const bar        = document.getElementById('pagination-bar');
    if (!bar) return;

    const totalPages = Math.ceil(total / PAGE_SIZE);
    if (total === 0) { bar.innerHTML = ''; return; }

    const start = (currentPage - 1) * PAGE_SIZE + 1;
    const end   = Math.min(currentPage * PAGE_SIZE, total);

    // Build page number buttons (show max 5 around current)
    const pageButtons = [];
    const maxVisible  = 5;
    let   startPage   = Math.max(1, currentPage - Math.floor(maxVisible / 2));
    let   endPage     = Math.min(totalPages, startPage + maxVisible - 1);
    if (endPage - startPage < maxVisible - 1) {
      startPage = Math.max(1, endPage - maxVisible + 1);
    }

    for (let i = startPage; i <= endPage; i++) {
      pageButtons.push(`
        <button
          class="btn btn-sm ${i === currentPage ? 'btn-primary' : 'btn-outline'}"
          onclick="SalesHistory.goPage(${i})"
        >${i}</button>`);
    }

    bar.innerHTML = `
      <span>Showing ${start}–${end} of ${total} sales</span>
      <div style="display:flex;gap:var(--space-1);align-items:center;">
        <button class="btn btn-outline btn-sm"
          ${currentPage === 1 ? 'disabled' : ''}
          onclick="SalesHistory.goPage(1)">
          <i class="fa-solid fa-angles-left"></i>
        </button>
        <button class="btn btn-outline btn-sm"
          ${currentPage === 1 ? 'disabled' : ''}
          onclick="SalesHistory.goPage(${currentPage - 1})">
          <i class="fa-solid fa-chevron-left"></i>
        </button>
        ${pageButtons.join('')}
        <button class="btn btn-outline btn-sm"
          ${currentPage === totalPages ? 'disabled' : ''}
          onclick="SalesHistory.goPage(${currentPage + 1})">
          <i class="fa-solid fa-chevron-right"></i>
        </button>
        <button class="btn btn-outline btn-sm"
          ${currentPage === totalPages ? 'disabled' : ''}
          onclick="SalesHistory.goPage(${totalPages})">
          <i class="fa-solid fa-angles-right"></i>
        </button>
      </div>`;
  }

  function goPage(page) {
    currentPage = page;
    expandedId  = null;
    renderTable();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
   // ── Count Label ───────────────────────────────────────────────────────────
  function updateCountLabel() {
    _set('sales-count-label',
      `${filteredSales.length} of ${allSales.length} sale${allSales.length !== 1 ? 's' : ''} shown`
    );
  }

  // ── Quick Range Buttons ───────────────────────────────────────────────────
  function applyQuickRange(range) {
    const fromEl = document.getElementById('date-from');
    const toEl   = document.getElementById('date-to');

    toEl.value = Utils.todayISO();

    if (range === 'today') {
      fromEl.value = Utils.todayISO();
    } else if (range === 'all') {
      fromEl.value = '';
      toEl.value   = '';
    } else {
      fromEl.value = Utils.daysAgoISO(parseInt(range, 10));
    }

    applyFilters();
  }

  // ── Event Binding ─────────────────────────────────────────────────────────
  function bindEvents() {
    // Search input (debounced)
    document.getElementById('sales-search')?.addEventListener(
      'input', Utils.debounce(applyFilters, 300)
    );

    // Date & method filters
    ['date-from', 'date-to', 'method-filter'].forEach((id) => {
      document.getElementById(id)?.addEventListener('change', applyFilters);
    });

    // Quick range buttons
    document.querySelectorAll('.range-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.range-btn').forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');
        applyQuickRange(btn.dataset.range);
      });
    });

    // Clear filters button
    document.getElementById('clear-filters-btn')?.addEventListener('click', () => {
      document.getElementById('sales-search').value = '';
      document.getElementById('date-from').value    = Utils.daysAgoISO(30);
      document.getElementById('date-to').value      = Utils.todayISO();
      document.getElementById('method-filter').value = '';
      document.querySelectorAll('.range-btn').forEach((b) => {
        b.classList.toggle('active', b.dataset.range === '30');
      });
      applyFilters();
    });
  }

  // ── Modal Button Binding ──────────────────────────────────────────────────
  function bindModalButtons() {
    document.getElementById('modal-print-btn')?.addEventListener('click', () => {
      if (viewingSale) printReceipt(viewingSale.id);
    });

    document.getElementById('modal-whatsapp-btn')?.addEventListener('click', () => {
      if (viewingSale) shareWhatsApp(viewingSale);
    });
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function _methodConfig(method) {
    const map = {
      cash:     { label: 'Cash',     icon: 'fa-money-bill-wave',    cls: 'method-cash'     },
      transfer: { label: 'Transfer', icon: 'fa-building-columns',   cls: 'method-transfer' },
      card:     { label: 'Card',     icon: 'fa-credit-card',        cls: 'method-card'     },
    };
    return map[method] || map.cash;
  }

  function _set(id, val) {
    const el = document.getElementById(id);
    if (el) el.textContent = val;
  }

  // Public API
  return { init, toggleExpand, viewReceipt, printReceipt, goPage };

})();

document.addEventListener('DOMContentLoaded', () => {
  App.init({
    pageTitle: 'Sales History',
    onReady:   () => SalesHistory.init(),
  });
});

</script>
</body>
</html>
