<!DOCTYPE html>
<html lang="en-NG" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — LedgerPulse</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/theme.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-app);
    }
    .offline-card {
      text-align: center;
      max-width: 400px;
      padding: var(--space-10) var(--space-8);
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl);
    }
    .offline-icon {
      width: 72px; height: 72px;
      border-radius: var(--radius-xl);
      background: var(--color-warning-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; color: var(--color-warning);
      margin: 0 auto var(--space-5);
    }
  </style>
</head>
<body>
  <div class="offline-card animate-fade-in">
    <div class="offline-icon"><i class="fa-solid fa-wifi"></i></div>
    <h2 style="font-size:var(--text-xl);font-weight:700;margin-bottom:var(--space-2);">You're Offline</h2>
    <p style="color:var(--text-muted);font-size:var(--text-sm);margin-bottom:var(--space-6);">
      No internet connection detected. LedgerPulse works offline for cached pages —
      check your connection and try again.
    </p>
    <button onclick="window.location.reload()" class="btn btn-primary w-100">
      <i class="fa-solid fa-rotate-right"></i> Try Again
    </button>
    <a href="index.html" class="btn btn-outline w-100 mt-2">
      <i class="fa-solid fa-house"></i> Go to Login
    </a>
  </div>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/theme.js"></script>
  <script>document.addEventListener('DOMContentLoaded', () => { Theme.init(); Theme.bindToggleButtons(); });</script>
</body>
</html>
